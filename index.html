<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiGame | Performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .game-card { background: #1e293b; border: 1px solid #334155; transition: all 0.3s ease; }
        .game-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        
        /* Popup (Modal) Tasarımı */
        #guideModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 50; }
        .modal-content { background: #0f172a; border: 1px solid #3b82f6; max-width: 500px; margin: 10% auto; padding: 2rem; border-radius: 20px; position: relative; }
    </style>
</head>
<body class="p-8">

    <header class="text-center py-12">
        <h1 class="text-5xl font-black text-blue-500 mb-4 uppercase tracking-tighter">OptiGame Hub</h1>
        <p class="text-slate-400 text-lg mb-8">Click 'Read Guide' to see FPS optimization for each game.</p>
        <input type="text" id="searchInput" onkeyup="filterGames()" placeholder="Search game..." 
               class="p-3 w-full max-w-md bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500">
    </header>

    <div id="gameGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>

    <div id="guideModal">
        <div class="modal-content text-center">
            <h2 id="modalTitle" class="text-3xl font-bold text-blue-400 mb-4"></h2>
            <div id="modalBody" class="text-slate-300 text-left space-y-4 mb-6">
                </div>
            <button onclick="closeGuide()" class="bg-red-500 hover:bg-red-600 px-6 py-2 rounded-lg font-bold">Close</button>
        </div>
    </div>

    <script>
        const games = ["Dead by Daylight", "Life is Strange 2", "Mortal Kombat 1", "SILENT HILL 2", "Dying Light: The Beast", "Assassin's Creed IV Black Flag", "Mafia: Definitive Edition", "Red Dead Redemption 2", "Detroit: Become Human", "DEVOUR", "Battlefield 6", "Dying Light", "Battlefield 1", "BeamNG.drive", "Arma 3", "Car Mechanic Simulator 2021", "Assetto Corsa", "Counter-Strike 2", "The Last of Us Part II Remastered", "A Way Out", "Age of History II", "Assassin's Creed Shadows", "Assetto Corsa Competizione", "Black Desert", "Electrician Simulator", "Euro Truck Simulator 2", "Far Cry 6", "Grand Theft Auto V Enhanced", "Green Hell", "Hitman: Absolution", "iRacing", "It Takes Two", "Left 4 Dead 2", "Life is Strange", "Mount & Blade", "Mount & Blade: Warband", "Muck", "My Summer Car", "My Winter Car", "PAYDAY 2", "PEAK", "Portal 2", "R.E.P.O.", "Rust", "Shadow of the Tomb Raider", "Silent Hill: Homecoming", "Sons of the Forest", "Stray", "The Crew Motorfest", "The Forest", "The Walking Dead", "The Witcher 3: Wild Hunt", "theHunter: Call of the Wild", "Rainbow Six Siege", "Watch Dogs: Legion", "WRC 10"];

        const grid = document.getElementById('gameGrid');

        function renderGames(filter = "") {
            grid.innerHTML = "";
            games.forEach(game => {
                if(game.toLowerCase().includes(filter.toLowerCase())) {
                    grid.innerHTML += `
                        <div class="game-card p-6 rounded-2xl flex flex-col justify-between">
                            <h2 class="text-lg font-bold mb-4 text-white">${game}</h2>
                            <button onclick="openGuide('${game}')" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm transition-colors">Read Guide</button>
                        </div>
                    `;
                }
            });
        }

        function openGuide(gameName) {
            document.getElementById('modalTitle').innerText = gameName;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>🔥 Target FPS:</strong> 60 FPS</p>
                <p><strong>🛠️ Key Tweaks:</strong> Set Texture to Medium, Disable Motion Blur, and use our custom Config.ini file for ${gameName}.</p>
                <p class="text-xs text-slate-500 font-mono italic">Note: Guide content is being updated...</p>
            `;
            document.getElementById('guideModal').style.display = "block";
        }

        function closeGuide() {
            document.getElementById('guideModal').style.display = "none";
        }

        function filterGames() {
            renderGames(document.getElementById('searchInput').value);
        }

        renderGames();
    </script>
</body>
</html>
