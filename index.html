<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Tarzı Oyun Platformu</title>
    <style>
        /* CSS TASARIM BÖLÜMÜ */
        body {
            background-color: #1b2838; /* Steam koyu arka plan */
            color: #c7d5ed;
            font-family: 'Motiva Sans', Sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navigasyon Çubuğu */
        nav {
            background-color: #171a21;
            padding: 20px 10%;
            display: flex;
            gap: 20px;
            text-transform: uppercase;
            font-size: 14px;
            font-weight: bold;
        }

        nav a {
            color: #dcdedf;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            color: #fff;
        }

        /* Ana Konteyner */
        .container {
            width: 80%;
            margin: 20px auto;
        }

        /* Öne Çıkan Alan (Hero) */
        .featured {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('https://via.placeholder.com/1200x500');
            background-size: cover;
            height: 400px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .featured h1 {
            font-size: 48px;
            margin: 0;
            color: #fff;
        }

        /* Oyun Kartları Grid Yapısı */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .game-card {
            background-color: #16202d;
            border-radius: 2px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .game-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .game-info {
            padding: 15px;
        }

        .game-title {
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .price-tag {
            background-color: #000;
            display: inline-block;
            padding: 5px 10px;
            color: #a3da36; /* Steam indirim yeşili */
            font-weight: bold;
        }

        .btn-buy {
            background: linear-gradient(to right, #75b022, #588a1b);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 2px;
            cursor: pointer;
            float: right;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Mağaza</a>
        <a href="#">Topluluk</a>
        <a href="#">Hakkında</a>
        <a href="#">Destek</a>
    </nav>

    <div class="container">
        <div class="featured">
            <h1>Cyberpunk 2077</h1>
            <p>Geleceğin dünyasına adım atın.</p>
        </div>

        <h2>Popüler ve Tavsiye Edilenler</h2>
        
        <div class="games-grid">
            <div class="game-card">
                <img src="https://via.placeholder.com/300x150" alt="Oyun">
                <div class="game-info">
                    <span class="game-title">The Witcher 3</span>
                    <div class="price-tag">249,00 TL</div>
                    <button class="btn-buy">Ekle</button>
                </div>
            </div>

            <div class="game-card">
                <img src="https://via.placeholder.com/300x150" alt="Oyun">
                <div class="game-info">
                    <span class="game-title">Elden Ring</span>
                    <div class="price-tag">599,00 TL</div>
                    <button class="btn-buy">Ekle</button>
                </div>
            </div>

            <div class="game-card">
                <img src="https://via.placeholder.com/300x150" alt="Oyun">
                <div class="game-info">
                    <span class="game-title">Counter-Strike 2</span>
                    <div class="price-tag" style="color: #66c0f4;">Ücretsiz</div>
                    <button class="btn-buy">Oyna</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
