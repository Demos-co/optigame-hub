<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiGame | All Games Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .game-card { 
            background: #1e293b; 
            border: 1px solid #334155; 
            transition: all 0.3s ease; 
        }
        .game-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
    </style>
</head>
<body class="p-8">

    <header class="text-center py-12">
        <h1 class="text-5xl font-black text-blue-500 mb-4 uppercase">All Games</h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto mb-8">
            Detailed performance optimization and FPS fixes for your entire library.
        </p>
        <input type="text" id="searchInput" onkeyup="filterGames()" placeholder="Search your game..." 
               class="p-3 w-full max-w-md bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500">
    </header>

    <div id="gameGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        </div>

    <script>
        const games = [
            "Dead by Daylight", "Life is Strange 2", "Mortal Kombat 1", "SILENT HILL 2", 
            "Dying Light: The Beast", "Assassin's Creed IV Black Flag", "Mafia: Definitive Edition", 
            "Red Dead Redemption 2", "Detroit: Become Human", "DEVOUR", "Battlefield 6", 
            "Dying Light", "Battlefield 1", "BeamNG.drive", "Arma 3", "Car Mechanic Simulator 2021", 
            "Assetto Corsa", "Counter-Strike 2", "The Last of Us Part II Remastered", "A Way Out", 
            "Age of History II", "Assassin's Creed Shadows", "Assetto Corsa Competizione", 
            "Black Desert", "Electrician Simulator", "Euro Truck Simulator 2", "Far Cry 6", 
            "Grand Theft Auto V Enhanced", "Green Hell", "Hitman: Absolution", "iRacing", 
            "It Takes Two", "Left 4 Dead 2", "Life is Strange", "Mount & Blade", 
            "Mount & Blade: Warband", "Muck", "My Summer Car", "My Winter Car", "PAYDAY 2", 
            "PEAK", "Portal 2", "R.E.P.O.", "Rust", "Shadow of the Tomb Raider", 
            "Silent Hill: Homecoming", "Sons of the Forest", "Stray", "The Crew Motorfest", 
            "The Forest", "The Walking Dead: Telltale", "The Witcher 3: Wild Hunt", 
            "theHunter: Call of the Wild", "Tom Clancy's Rainbow Six Siege", "Watch Dogs: Legion", 
            "WRC 10 FIA World Rally Champion"
        ];

        const grid = document.getElementById('gameGrid');

        function renderGames(filter = "") {
            grid.innerHTML = "";
            games.forEach(game => {
                if(game.toLowerCase().includes(filter.toLowerCase())) {
                    grid.innerHTML += `
                        <div class="game-card p-6 rounded-2xl flex flex-col justify-between">
                            <div>
                                <h2 class="text-lg font-bold mb-2 text-white">${game}</h2>
                                <p class="text-slate-500 text-xs italic mb-4">Description: Optimization guide and FPS boost settings for ${game}.</p>
                            </div>
                            <button class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm transition-colors">Read Guide</button>
                        </div>
                    `;
                }
            });
        }

        function filterGames() {
            const val = document.getElementById('searchInput').value;
            renderGames(val);
        }

        renderGames(); // İlk açılışta hepsini bas
    </script>
</body>
</html>
